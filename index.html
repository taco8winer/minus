  <script type="module">
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.1/build/stlite.js";
    const files = JSON.parse("{\"app.py\": \"\\\"\\\"\\\"MINUS — 多忙なビジネスパーソン専用の理詰めヘルスケア（プロトタイプv0）。\\n\\n起動: streamlit run app.py\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nimport os\\nimport sys\\n\\n# このディレクトリを import パスに（streamlit run でも core/db/ui を解決できるように）\\nROOT = os.path.dirname(os.path.abspath(__file__))\\nif ROOT not in sys.path:\\n    sys.path.insert(0, ROOT)\\n\\nimport streamlit as st\\n\\nfrom db.repository import Repository\\nfrom ui.pages import (\\n    home, recovery_sim, morning_log, history, detox, training, profile_page,\\n)\\n\\nst.set_page_config(page_title=\\\"MINUS\\\", page_icon=\\\"➖\\\", layout=\\\"centered\\\")\\n\\n\\n@st.cache_resource\\ndef get_repo() -> Repository:\\n    # ブラウザ(stlite)では IndexedDB永続FS(/mnt)上にDBを置き、書き込み毎にsyncfsで同期する。\\n    # 起動時の読み込みは stlite が自動で行う。デスクトップでは通常のファイル永続化。\\n    from db import browser_persist\\n\\n    if browser_persist.is_browser():\\n        return Repository(browser_persist.DB_PATH, on_write=browser_persist.flush)\\n    return Repository()\\n\\n\\nPAGES = {\\n    \\\"🏠 今日\\\": home.render,\\n    \\\"⚡ 神リカバリー\\\": recovery_sim.render,\\n    \\\"🚿 デトックス\\\": detox.render,\\n    \\\"🌅 毎朝の体重\\\": morning_log.render,\\n    \\\"💪 筋トレメモ\\\": training.render,\\n    \\\"📈 ログ＆グラフ\\\": history.render,\\n    \\\"⚙️ プロフィール\\\": profile_page.render,\\n}\\n\\n\\ndef main() -> None:\\n    repo = get_repo()\\n    # 体重は「毎朝の体重」の最新値を反映（計算が自動連動）\\n    profile = repo.effective_profile()\\n\\n    st.sidebar.title(\\\"➖ MINUS\\\")\\n    st.sidebar.caption(\\\"理詰めの神リカバリー\\\")\\n    choice = st.sidebar.radio(\\\"メニュー\\\", list(PAGES.keys()), label_visibility=\\\"collapsed\\\")\\n    st.sidebar.divider()\\n    st.sidebar.caption(\\n        f\\\"{profile.name} / {profile.age}歳 / {profile.height_cm}cm / \\\"\\n        f\\\"目標{profile.target_weight_kg}kg\\\"\\n    )\\n\\n    PAGES[choice](repo, profile)\\n\\n\\nif __name__ == \\\"__main__\\\":\\n    main()\\n\", \"core/__init__.py\": \"\\\"\\\"\\\"MINUS — 理詰めヘルスケアの計算エンジン（Streamlit非依存・純Python）。\\n\\nUIや永続化に依存しないため、将来 FastAPI / Next.js 等へそのまま移植できる。\\n\\\"\\\"\\\"\\n\", \"core/detox.py\": \"\\\"\\\"\\\"アルコール・塩分デトックス（③機能の枠）。\\n\\n飲酒・高塩分イベントを「水で押し出す（利尿）」ための翌朝までの補給量を算出する。\\n水分計算は hydration.compute_water_debt を再利用し、アルコール/塩分由来分のみを抽出する。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom dataclasses import dataclass\\nfrom typing import List\\n\\nfrom .hydration import compute_water_debt\\nfrom .models import Event\\nfrom .profile import Profile\\n\\n\\n@dataclass\\nclass DetoxPlan:\\n    salt_g: float\\n    alcohol_g: float\\n    flush_water_ml: float    # 押し出しに必要な追加水分（負債分のみ）\\n    note: str\\n\\n\\n@dataclass\\nclass DetoxStage:\\n    label: str               # \\\"就寝前まで\\\" など\\n    amount_ml: int\\n    note: str\\n\\n\\ndef _round50(value: float) -> int:\\n    return int(round(value / 50.0) * 50)\\n\\n\\ndef build_detox_schedule(flush_water_ml: float, profile: Profile) -> List[DetoxStage]:\\n    \\\"\\\"\\\"押し出し水分を翌朝までの3ステージに分割する。\\n\\n    理詰め：利尿で濃縮する血液を、睡眠を妨げない範囲で前後に振り分ける。\\n      - 就寝前まで：寝る直前を避けつつ一定量（夜間頻尿を回避）。1回上限でキャップ。\\n      - 起床直後：最も濃縮した状態を一気に薄める（最優先）。\\n      - 午前中：残りを分割で、尿の色が薄くなるまで。\\n    \\\"\\\"\\\"\\n    flush = max(0.0, flush_water_ml)\\n    if flush \u003c= 0:\\n        return []\\n\\n    pre_bed = min(flush * 0.4, profile.max_single_intake_ml)\\n    wake = flush * 0.35\\n    morning = flush - pre_bed - wake\\n\\n    stages = [\\n        DetoxStage(\\\"就寝前まで\\\", _round50(pre_bed),\\n                   \\\"就寝1〜2h前までに。寝る直前は避け夜間頻尿を回避\\\"),\\n        DetoxStage(\\\"起床直後\\\", _round50(wake),\\n                   \\\"利尿で濃縮した血液を一気に薄める。最優先\\\"),\\n        DetoxStage(\\\"午前中\\\", _round50(morning),\\n                   \\\"残りを分割で。尿の色が薄くなるまで継続\\\"),\\n    ]\\n    return [s for s in stages if s.amount_ml > 0]\\n\\n\\ndef build_detox_plan(events: List[Event], profile: Profile) -> DetoxPlan:\\n    debt = compute_water_debt(events, profile)\\n    note_parts = []\\n    if debt.alcohol_g > 0:\\n        note_parts.append(\\n            f\\\"アルコール{debt.alcohol_g:.0f}gの利尿で失う分を補い、翌朝までに約{debt.alcohol_ml:.0f}mlを補給。\\\"\\n        )\\n    if debt.salt_g > 0:\\n        note_parts.append(\\n            f\\\"塩分{debt.salt_g:.0f}gの排泄に約{debt.salt_ml:.0f}mlの水で押し出す。\\\"\\n        )\\n    if not note_parts:\\n        note_parts.append(\\\"デトックス対象の飲酒・高塩分イベントはありません。\\\")\\n\\n    return DetoxPlan(\\n        salt_g=debt.salt_g,\\n        alcohol_g=debt.alcohol_g,\\n        flush_water_ml=debt.extra_ml,\\n        note=\\\" \\\".join(note_parts),\\n    )\\n\", \"core/food_db.py\": \"\\\"\\\"\\\"内蔵フードDB：品名 → 栄養素の近似値（1食/1杯/1人前あたり、g）。\\n\\nカロリー入力の面倒さを消すための「だいたいの数値」を返す。正確な栄養計算が目的ではなく、\\n理詰めの水分・引き算ロジックを回すための概算。該当が無ければ手動入力にフォールバックする。\\n値はあくまで目安。実測で `core/profile.py` 同様に調整してよい。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom dataclasses import dataclass\\nfrom typing import List, Optional\\n\\n\\n@dataclass(frozen=True)\\nclass Food:\\n    label: str\\n    category: str          # \\\"meal\\\" | \\\"drink\\\" | \\\"salty\\\"\\n    salt_g: float = 0.0\\n    carb_g: float = 0.0\\n    fat_g: float = 0.0\\n    protein_g: float = 0.0\\n    alcohol_g: float = 0.0\\n    aliases: tuple = ()    # 検索用の別名\\n\\n\\ndef _n(s: str) -> str:\\n    return s.strip().lower().replace(\\\" \\\", \\\"\\\").replace(\\\"　\\\", \\\"\\\")\\n\\n\\n# label, category, salt, carb, fat, protein, alcohol, aliases\\nFOODS: List[Food] = [\\n    # --- 主食・丼・麺 ---\\n    Food(\\\"ご飯(茶碗1杯)\\\", \\\"meal\\\", 0.0, 55, 0.5, 4, aliases=(\\\"白米\\\", \\\"ライス\\\", \\\"ごはん\\\", \\\"米\\\")),\\n    Food(\\\"大盛りご飯\\\", \\\"meal\\\", 0.0, 90, 0.8, 6, aliases=(\\\"ご飯大盛り\\\", \\\"大盛り\\\")),\\n    Food(\\\"おにぎり1個\\\", \\\"meal\\\", 1.0, 40, 0.5, 3, aliases=(\\\"おにぎり\\\", \\\"おむすび\\\")),\\n    Food(\\\"食パン1枚\\\", \\\"meal\\\", 0.7, 28, 2.5, 5, aliases=(\\\"トースト\\\", \\\"パン\\\")),\\n    Food(\\\"ラーメン\\\", \\\"meal\\\", 6.0, 70, 18, 25, aliases=(\\\"らーめん\\\",)),\\n    Food(\\\"ラーメン(スープ完飲)\\\", \\\"salty\\\", 8.0, 75, 20, 27, aliases=(\\\"ラーメンスープ完飲\\\", \\\"ラーメン汁まで\\\")),\\n    Food(\\\"二郎系ラーメン\\\", \\\"meal\\\", 8.0, 140, 45, 40, aliases=(\\\"二郎\\\", \\\"ジロー\\\", \\\"じろう\\\")),\\n    Food(\\\"つけ麺\\\", \\\"meal\\\", 7.0, 95, 22, 30, aliases=(\\\"つけめん\\\",)),\\n    Food(\\\"そば\\\", \\\"meal\\\", 4.0, 60, 3, 12, aliases=(\\\"蕎麦\\\", \\\" soba\\\")),\\n    Food(\\\"うどん\\\", \\\"meal\\\", 4.0, 60, 2, 8, aliases=(\\\"饂飩\\\",)),\\n    Food(\\\"パスタ\\\", \\\"meal\\\", 3.0, 80, 20, 15, aliases=(\\\"スパゲティ\\\", \\\"ペペロンチーノ\\\", \\\"パスタ\\\")),\\n    Food(\\\"チャーハン\\\", \\\"meal\\\", 3.0, 80, 18, 12, aliases=(\\\"炒飯\\\", \\\"焼き飯\\\", \\\"焼きめし\\\")),\\n    Food(\\\"カレーライス\\\", \\\"meal\\\", 3.0, 100, 20, 15, aliases=(\\\"カレー\\\",)),\\n    Food(\\\"牛丼\\\", \\\"meal\\\", 3.0, 100, 25, 20, aliases=(\\\"ぎゅうどん\\\",)),\\n    Food(\\\"親子丼\\\", \\\"meal\\\", 3.0, 95, 15, 25, aliases=(\\\"おやこどん\\\",)),\\n    Food(\\\"肉吸い定食+大盛り\\\", \\\"meal\\\", 5.0, 120, 25, 35, aliases=(\\\"肉吸い\\\", \\\"にくすい\\\")),\\n    Food(\\\"寿司(1人前)\\\", \\\"meal\\\", 4.0, 90, 12, 30, aliases=(\\\"すし\\\", \\\"鮨\\\", \\\"寿司\\\")),\\n    Food(\\\"ピザ(2切れ)\\\", \\\"meal\\\", 3.0, 60, 25, 20, aliases=(\\\"ぴざ\\\",)),\\n    Food(\\\"ハンバーガー\\\", \\\"meal\\\", 2.5, 40, 25, 20, aliases=(\\\"バーガー\\\",)),\\n    # --- おかず・タンパク ---\\n    Food(\\\"焼肉(1人前)\\\", \\\"meal\\\", 3.0, 10, 40, 45, aliases=(\\\"やきにく\\\",)),\\n    Food(\\\"ステーキ(200g)\\\", \\\"meal\\\", 1.5, 2, 40, 45, aliases=(\\\"ステーキ\\\",)),\\n    Food(\\\"唐揚げ(5個)\\\", \\\"meal\\\", 2.0, 15, 25, 25, aliases=(\\\"からあげ\\\", \\\"鶏から\\\", \\\"から揚げ\\\")),\\n    Food(\\\"とんかつ\\\", \\\"meal\\\", 2.0, 20, 35, 30, aliases=(\\\"豚カツ\\\", \\\"カツ\\\")),\\n    Food(\\\"餃子(6個)\\\", \\\"meal\\\", 2.0, 25, 12, 12, aliases=(\\\"ぎょうざ\\\", \\\"ギョーザ\\\")),\\n    Food(\\\"焼き魚(鮭)\\\", \\\"meal\\\", 1.0, 0.5, 8, 22, aliases=(\\\"鮭\\\", \\\"サケ\\\", \\\"焼き魚\\\", \\\"焼魚\\\")),\\n    Food(\\\"刺身\\\", \\\"meal\\\", 1.0, 1, 5, 20, aliases=(\\\"さしみ\\\", \\\"お造り\\\")),\\n    Food(\\\"鶏むね肉(100g)\\\", \\\"meal\\\", 0.1, 0, 1.5, 23, aliases=(\\\"鶏むね\\\", \\\"むね肉\\\", \\\"とりむね\\\")),\\n    Food(\\\"ささみ(2本)\\\", \\\"meal\\\", 0.2, 0, 0.8, 23, aliases=(\\\"ササミ\\\",)),\\n    Food(\\\"卵1個\\\", \\\"meal\\\", 0.2, 0.2, 5, 6, aliases=(\\\"たまご\\\", \\\"玉子\\\", \\\"ゆで卵\\\", \\\"ゆでたまご\\\")),\\n    Food(\\\"納豆1パック\\\", \\\"meal\\\", 0.5, 6, 5, 8, aliases=(\\\"なっとう\\\",)),\\n    Food(\\\"豆腐(半丁)\\\", \\\"meal\\\", 0.0, 2, 5, 10, aliases=(\\\"とうふ\\\", \\\"冷奴\\\")),\\n    Food(\\\"サラダ\\\", \\\"meal\\\", 1.0, 8, 5, 3, aliases=(\\\"さらだ\\\", \\\"野菜\\\")),\\n    Food(\\\"味噌汁\\\", \\\"meal\\\", 1.5, 3, 1, 2, aliases=(\\\"みそ汁\\\", \\\"みそしる\\\")),\\n    Food(\\\"ヨーグルト\\\", \\\"meal\\\", 0.1, 12, 3, 4, aliases=(\\\"よーぐると\\\",)),\\n    Food(\\\"バナナ1本\\\", \\\"meal\\\", 0.0, 23, 0.2, 1, aliases=(\\\"ばなな\\\",)),\\n    Food(\\\"プロテイン1杯\\\", \\\"meal\\\", 0.1, 3, 1.5, 22, aliases=(\\\"プロテイン\\\", \\\"protein\\\")),\\n    # --- 高塩分・つまみ ---\\n    Food(\\\"鯖のへしこ\\\", \\\"salty\\\", 6.0, 0, 10, 12, aliases=(\\\"へしこ\\\", \\\"サバのへしこ\\\")),\\n    Food(\\\"漬物\\\", \\\"salty\\\", 2.0, 5, 0, 1, aliases=(\\\"つけもの\\\", \\\"お新香\\\")),\\n    Food(\\\"ポテトチップス\\\", \\\"salty\\\", 1.0, 30, 20, 3, aliases=(\\\"ポテチ\\\", \\\"チップス\\\")),\\n    Food(\\\"枝豆\\\", \\\"salty\\\", 1.0, 8, 5, 10, aliases=(\\\"えだまめ\\\",)),\\n    Food(\\\"明太子\\\", \\\"salty\\\", 3.0, 1, 2, 6, aliases=(\\\"めんたいこ\\\", \\\"辛子明太子\\\")),\\n    # --- 飲酒 ---\\n    Food(\\\"生中(ビール500ml)\\\", \\\"drink\\\", 0.0, 15, 0, 2, alcohol_g=20, aliases=(\\\"生中\\\", \\\"ビール\\\", \\\"生ビール\\\", \\\"beer\\\")),\\n    Food(\\\"ハイボール\\\", \\\"drink\\\", 0.0, 0, 0, 0, alcohol_g=16, aliases=(\\\"はいぼーる\\\", \\\"ハイボール\\\")),\\n    Food(\\\"レモンサワー\\\", \\\"drink\\\", 0.0, 8, 0, 0, alcohol_g=16, aliases=(\\\"サワー\\\", \\\"酎ハイ\\\", \\\"チューハイ\\\")),\\n    Food(\\\"日本酒1合\\\", \\\"drink\\\", 0.0, 8, 0, 0, alcohol_g=22, aliases=(\\\"日本酒\\\", \\\"酒\\\", \\\"清酒\\\")),\\n    Food(\\\"焼酎(ロック)\\\", \\\"drink\\\", 0.0, 0, 0, 0, alcohol_g=20, aliases=(\\\"焼酎\\\", \\\"しょうちゅう\\\")),\\n    Food(\\\"ワイン(グラス)\\\", \\\"drink\\\", 0.0, 2, 0, 0, alcohol_g=12, aliases=(\\\"ワイン\\\", \\\"赤ワイン\\\", \\\"白ワイン\\\", \\\"wine\\\")),\\n    Food(\\\"梅酒\\\", \\\"drink\\\", 0.0, 20, 0, 0, alcohol_g=12, aliases=(\\\"うめしゅ\\\",)),\\n    Food(\\\"水・お茶\\\", \\\"drink\\\", 0.0, 0, 0, 0, aliases=(\\\"水\\\", \\\"お茶\\\", \\\"緑茶\\\", \\\"麦茶\\\", \\\"water\\\")),\\n]\\n\\nCATEGORY_LABEL = {\\\"meal\\\": \\\"🍜 食事\\\", \\\"drink\\\": \\\"🍺 飲酒\\\", \\\"salty\\\": \\\"🧂 高塩分\\\"}\\n\\n\\ndef _keys(food: Food) -> List[str]:\\n    return [_n(food.label)] + [_n(a) for a in food.aliases]\\n\\n\\ndef search(query: str, limit: int = 6) -> List[Food]:\\n    \\\"\\\"\\\"品名で候補を返す。完全一致 > 前方一致 > 部分一致 の順。\\\"\\\"\\\"\\n    q = _n(query)\\n    if not q:\\n        return []\\n    exact, starts, contains = [], [], []\\n    for f in FOODS:\\n        keys = _keys(f)\\n        if q in keys:\\n            exact.append(f)\\n        elif any(k.startswith(q) or q.startswith(k) for k in keys):\\n            starts.append(f)\\n        elif any(q in k or k in q for k in keys):\\n            contains.append(f)\\n    ordered = exact + starts + contains\\n    # 重複除去（順序維持）\\n    seen, out = set(), []\\n    for f in ordered:\\n        if f.label not in seen:\\n            seen.add(f.label)\\n            out.append(f)\\n    return out[:limit]\\n\\n\\ndef lookup(query: str) -> Optional[Food]:\\n    \\\"\\\"\\\"最も近い1件を返す。無ければ None。\\\"\\\"\\\"\\n    results = search(query, limit=1)\\n    return results[0] if results else None\\n\", \"core/hydration.py\": \"\\\"\\\"\\\"水分ロジック：イベント → 必要水分量 ＋ 給水スケジュール。\\n\\n理詰めの中核：\\n  必要水分 = ベース(体重×35ml/kg) + 塩分負債(NaCl 1g→100ml) + アルコール補填(1g→12.5ml)\\nスケジュールは「就寝の2.5h前で重い摂取を打ち切る」ことで夜間頻尿を避けつつ前倒し配分する。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom dataclasses import dataclass, field\\nfrom datetime import datetime, timedelta\\nfrom typing import List\\n\\nfrom .models import Event\\nfrom .profile import Profile\\n\\n\\n@dataclass\\nclass WaterDebt:\\n    base_ml: float          # ベース水分\\n    salt_ml: float          # 塩分由来の追加\\n    alcohol_ml: float       # アルコール由来の追加\\n    salt_g: float = 0.0\\n    alcohol_g: float = 0.0\\n\\n    @property\\n    def total_ml(self) -> float:\\n        return self.base_ml + self.salt_ml + self.alcohol_ml\\n\\n    @property\\n    def extra_ml(self) -> float:\\n        \\\"\\\"\\\"ベースに上乗せされた負債分のみ。\\\"\\\"\\\"\\n        return self.salt_ml + self.alcohol_ml\\n\\n\\n@dataclass\\nclass WaterSlot:\\n    at: datetime\\n    amount_ml: int\\n    kind: str               # \\\"heavy\\\" | \\\"sip\\\"\\n    note: str = \\\"\\\"\\n\\n\\ndef compute_water_debt(events: List[Event], profile: Profile) -> WaterDebt:\\n    salt_g = sum(e.salt_g for e in events)\\n    alcohol_g = sum(e.alcohol_g for e in events)\\n    return WaterDebt(\\n        base_ml=profile.weight_kg * profile.water_ml_per_kg,\\n        salt_ml=salt_g * profile.sodium_water_ml_per_g,\\n        alcohol_ml=alcohol_g * profile.alcohol_water_ml_per_g,\\n        salt_g=salt_g,\\n        alcohol_g=alcohol_g,\\n    )\\n\\n\\ndef daily_water_target_ml(events: List[Event], profile: Profile) -> float:\\n    return compute_water_debt(events, profile).total_ml\\n\\n\\ndef _round_to(value: float, step: int) -> int:\\n    return int(round(value / step) * step)\\n\\n\\ndef build_schedule(\\n    target_ml: float,\\n    consumed_ml: float,\\n    now: datetime,\\n    profile: Profile,\\n    interval_min: int = 60,\\n) -> List[WaterSlot]:\\n    \\\"\\\"\\\"残りの必要水分を、打ち切り時刻まで前倒しで配分する。\\n\\n    打ち切り時刻(cutoff)以降〜就寝までは少量(sip)のみ。\\n    \\\"\\\"\\\"\\n    midnight = now.replace(hour=0, minute=0, second=0, microsecond=0)\\n    cutoff = midnight + timedelta(hours=profile.bed_hour - profile.last_heavy_intake_buffer_h)\\n    bed = midnight + timedelta(hours=profile.bed_hour)\\n    step = timedelta(minutes=interval_min)\\n\\n    remaining = max(0.0, target_ml - consumed_ml)\\n    slots: List[WaterSlot] = []\\n\\n    # --- 重い摂取スロット（now 〜 cutoff） ---\\n    heavy_times: List[datetime] = []\\n    t = now\\n    while t \u003c= cutoff:\\n        heavy_times.append(t)\\n        t += step\\n\\n    if heavy_times and remaining > 0:\\n        per = remaining / len(heavy_times)\\n        per = min(per, profile.max_single_intake_ml)\\n        per = max(_round_to(per, 50), 50)\\n        for ht in heavy_times:\\n            slots.append(WaterSlot(at=ht, amount_ml=per, kind=\\\"heavy\\\"))\\n\\n    # --- 打ち切り後の少量スロット（cutoff 〜 bed） ---\\n    first_sip = max(cutoff, now) + step\\n    t = first_sip\\n    while t \u003c bed:\\n        slots.append(\\n            WaterSlot(\\n                at=t,\\n                amount_ml=profile.sip_ml,\\n                kind=\\\"sip\\\",\\n                note=\\\"就寝前は少量で（夜間頻尿を回避）\\\",\\n            )\\n        )\\n        t += step\\n\\n    return slots\\n\\n\\ndef schedule_total_ml(slots: List[WaterSlot]) -> int:\\n    return sum(s.amount_ml for s in slots)\\n\", \"core/models.py\": \"\\\"\\\"\\\"ドメインモデル（純データ）。DB行とUI入力の橋渡しに使う。\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom dataclasses import dataclass, field\\nfrom datetime import date, datetime\\nfrom typing import Optional\\n\\n\\n@dataclass\\nclass Event:\\n    \\\"\\\"\\\"飲食イベント。栄養素は g 単位。\\\"\\\"\\\"\\n    name: str\\n    eaten_at: datetime\\n    salt_g: float = 0.0\\n    carb_g: float = 0.0\\n    fat_g: float = 0.0\\n    protein_g: float = 0.0\\n    alcohol_g: float = 0.0\\n    note: str = \\\"\\\"\\n    id: Optional[int] = None\\n\\n\\n@dataclass\\nclass WeightLog:\\n    log_date: date\\n    weight_kg: float\\n    waist_cm: Optional[float] = None\\n    id: Optional[int] = None\\n\\n\\n@dataclass\\nclass Workout:\\n    log_date: date\\n    exercise: str          # 例: \\\"chestpress\\\", \\\"abbench\\\"\\n    weight_kg: float = 0.0\\n    reps: int = 0          # 1セット目のレップ数\\n    sets: int = 1\\n    note: str = \\\"\\\"\\n    id: Optional[int] = None\\n\\n\\n@dataclass\\nclass TrainingNote:\\n    \\\"\\\"\\\"1日の筋トレメニューのフリーメモ（日付ごとに1件）。\\\"\\\"\\\"\\n    log_date: date\\n    body: str\\n    id: Optional[int] = None\\n\", \"core/presets.py\": \"\\\"\\\"\\\"ワンタップ入力用のプリセット。\\n\\n既存アプリの「カロリー入力が面倒」を消す核。よく食べる/飲むものを\\n塩分・糖質・脂質・タンパク・アルコール(g) で事前定義しておく。\\n数値は概算の目安。実測に合わせて自由に追加・調整する。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom dataclasses import dataclass\\nfrom datetime import datetime\\nfrom typing import List, Optional\\n\\nfrom .models import Event\\n\\n\\n@dataclass(frozen=True)\\nclass Preset:\\n    key: str\\n    label: str\\n    category: str          # \\\"meal\\\" | \\\"drink\\\" | \\\"salty\\\"\\n    salt_g: float = 0.0\\n    carb_g: float = 0.0\\n    fat_g: float = 0.0\\n    protein_g: float = 0.0\\n    alcohol_g: float = 0.0\\n    id: Optional[int] = None   # 組み込みは None、ユーザー登録(DB保存)は採番される\\n\\n    def to_event(self, eaten_at: datetime, note: str = \\\"\\\") -> Event:\\n        return Event(\\n            name=self.label,\\n            eaten_at=eaten_at,\\n            salt_g=self.salt_g,\\n            carb_g=self.carb_g,\\n            fat_g=self.fat_g,\\n            protein_g=self.protein_g,\\n            alcohol_g=self.alcohol_g,\\n            note=note,\\n        )\\n\\n\\nPRESETS: List[Preset] = [\\n    Preset(\\\"jiro\\\", \\\"二郎ラーメン(麺200g)\\\", \\\"meal\\\",\\n           salt_g=8.0, carb_g=140.0, fat_g=45.0, protein_g=40.0),\\n    Preset(\\\"nikusui\\\", \\\"肉吸い定食+大盛りご飯\\\", \\\"meal\\\",\\n           salt_g=5.0, carb_g=120.0, fat_g=25.0, protein_g=35.0),\\n    Preset(\\\"yakiniku\\\", \\\"焼肉+ご飯\\\", \\\"meal\\\",\\n           salt_g=4.0, carb_g=80.0, fat_g=40.0, protein_g=45.0),\\n    Preset(\\\"sushi\\\", \\\"寿司(中トロ多め)\\\", \\\"meal\\\",\\n           salt_g=4.0, carb_g=90.0, fat_g=20.0, protein_g=35.0),\\n    Preset(\\\"beer\\\", \\\"生中(ビール500ml)\\\", \\\"drink\\\",\\n           salt_g=0.0, carb_g=15.0, alcohol_g=20.0),\\n    Preset(\\\"highball\\\", \\\"ハイボール\\\", \\\"drink\\\",\\n           alcohol_g=16.0),\\n    Preset(\\\"sake\\\", \\\"日本酒1合\\\", \\\"drink\\\",\\n           carb_g=8.0, alcohol_g=22.0),\\n    Preset(\\\"heshiko\\\", \\\"鯖のへしこ\\\", \\\"salty\\\",\\n           salt_g=6.0, fat_g=10.0, protein_g=12.0),\\n    Preset(\\\"ramen_soup\\\", \\\"ラーメンスープ完飲\\\", \\\"salty\\\",\\n           salt_g=6.0, carb_g=10.0),\\n]\\n\\nPRESET_BY_KEY = {p.key: p for p in PRESETS}\\n\\n\\ndef presets_by_category(category: str) -> List[Preset]:\\n    return [p for p in PRESETS if p.category == category]\\n\", \"core/profile.py\": \"\\\"\\\"\\\"ペルソナ定数と、調整可能な生理係数。\\n\\nここに全ての「理詰め」の係数を集約する。初期値はあくまで一般的なヒューリスティック。\\n自分の実測（体重の戻り方、尿量、二日酔いの度合い等）で後から校正する前提。\\n医療機器ではなく意思決定支援のための目安。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom dataclasses import dataclass\\n\\n\\n@dataclass(frozen=True)\\nclass Profile:\\n    # --- 基本ステータス（プロフィール画面でユーザーが編集可能） ---\\n    name: str = \\\"Taira\\\"\\n    age: int = 37\\n    height_cm: float = 172.5\\n    weight_kg: float = 61.5          # 現在体重（水分・タンパク計算の基準）\\n    target_weight_kg: float = 60.0   # 目標体重（表示・ゴール用）\\n    waist_cm: float = 75.0\\n\\n    # --- 水分ロジック ---\\n    water_ml_per_kg: float = 35.0          # ベース水分 (ml / 体重kg / 日)\\n    sodium_water_ml_per_g: float = 100.0   # NaCl 1g の排泄に要する水分 (ml)\\n    alcohol_water_ml_per_g: float = 12.5   # アルコール1gあたりの利尿補填 (ml)  生中20g→250ml\\n\\n    # --- 給水スケジュール ---\\n    wake_hour: float = 7.0                 # 起床時刻 (h)\\n    bed_hour: float = 24.0                 # 就寝時刻 (h, 0-24)\\n    last_heavy_intake_buffer_h: float = 2.5  # 就寝何時間前で重い摂取を打ち切るか\\n    max_single_intake_ml: int = 500        # 1回あたりの上限\\n    sip_ml: int = 100                      # 打ち切り後の少量サイズ\\n\\n    # --- タンパク質 (超回復) ---\\n    protein_g_per_kg: float = 1.8          # 1日あたり目標 (g / kg)\\n    carb_flag_threshold_g: float = 100.0   # この糖質量を超えたら「引き算」発動\\n    fat_flag_threshold_g: float = 40.0     # この脂質量を超えたら低脂質を強く推奨\\n\\n    # --- 体重急減アラート ---\\n    rapid_drop_kg: float = 1.0             # 前日比 この値以上の減少で警告\\n    rapid_drop_ratio: float = 0.015        # もしくは体重比 1.5% 以上の減少\\n    ema_span_days: int = 7                 # トレンド抽出の指数移動平均スパン\\n\\n    # --- トレーニング戦略 ---\\n    chestpress_rep_threshold: int = 9      # 1セット目がこのレップ数到達で漸進性過負荷へ\\n    chestpress_increment_kg: float = 2.5   # 増量の刻み\\n\\n\\nDEFAULT_PROFILE = Profile()\\n\", \"core/recovery.py\": \"\\\"\\\"\\\"引き算メニュー生成：高負荷イベント → 夜・翌朝に何を「引く / 足す」か。\\n\\nロジック：\\n  - 糖質/脂質が閾値超 → 主食カット・低脂質を提案（引き算）\\n  - 超回復タンパク目標 (体重×1.8g) から摂取済みを引いた残量を提示（足し算）\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom dataclasses import dataclass, field\\nfrom typing import List\\n\\nfrom .models import Event\\nfrom .profile import Profile\\n\\n\\nLOW_FAT_PROTEIN_FOODS = [\\n    \\\"鶏むね肉(皮なし)\\\",\\n    \\\"ささみ\\\",\\n    \\\"白身魚(タラ等)\\\",\\n    \\\"卵白\\\",\\n    \\\"木綿豆腐\\\",\\n    \\\"納豆\\\",\\n    \\\"ギリシャヨーグルト(無脂肪)\\\",\\n    \\\"ブロッコリー\\\",\\n]\\n\\n\\n@dataclass\\nclass RecoveryPlan:\\n    protein_target_g: float\\n    protein_consumed_g: float\\n    protein_remaining_g: float\\n    carb_consumed_g: float\\n    fat_consumed_g: float\\n    carb_flag: bool\\n    fat_flag: bool\\n    suggestions: List[str] = field(default_factory=list)\\n    foods: List[str] = field(default_factory=list)\\n\\n\\ndef build_recovery_plan(events: List[Event], profile: Profile) -> RecoveryPlan:\\n    consumed_protein = sum(e.protein_g for e in events)\\n    consumed_carb = sum(e.carb_g for e in events)\\n    consumed_fat = sum(e.fat_g for e in events)\\n\\n    target = profile.weight_kg * profile.protein_g_per_kg\\n    remaining = max(0.0, target - consumed_protein)\\n\\n    carb_flag = consumed_carb >= profile.carb_flag_threshold_g\\n    fat_flag = consumed_fat >= profile.fat_flag_threshold_g\\n\\n    suggestions: List[str] = []\\n    if carb_flag:\\n        suggestions.append(\\n            f\\\"糖質を本日 約{consumed_carb:.0f}g 摂取済み。夜・翌朝は主食を抜くか半量に。\\\"\\n            \\\"グリコーゲン過多と血糖の乱高下をリセットする。\\\"\\n        )\\n    if fat_flag:\\n        suggestions.append(\\n            f\\\"脂質 約{consumed_fat:.0f}g 摂取済み。残りの食事は低脂質で\\\"\\n            \\\"（揚げ物・脂身・乳脂肪を避ける）。\\\"\\n        )\\n    if remaining > 0:\\n        suggestions.append(\\n            f\\\"超回復に必要なタンパク質はあと 約{remaining:.0f}g。\\\"\\n            \\\"下記の高タンパク・低脂質食材で分割摂取。\\\"\\n        )\\n    else:\\n        suggestions.append(\\n            \\\"本日のタンパク質目標は充足。追加は不要、水分と睡眠で回復を優先。\\\"\\n        )\\n\\n    foods = LOW_FAT_PROTEIN_FOODS if remaining > 0 else []\\n\\n    return RecoveryPlan(\\n        protein_target_g=target,\\n        protein_consumed_g=consumed_protein,\\n        protein_remaining_g=remaining,\\n        carb_consumed_g=consumed_carb,\\n        fat_consumed_g=consumed_fat,\\n        carb_flag=carb_flag,\\n        fat_flag=fat_flag,\\n        suggestions=suggestions,\\n        foods=foods,\\n    )\\n\", \"core/training_logic.py\": \"\\\"\\\"\\\"トレーニング戦略（②機能の枠）。\\n\\nチェストプレス1セット目の出来高から、次回の漸進性過負荷戦略をルールで提示する。\\nv0では枠として最小限を実装、②フェーズで種目を拡張する。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom dataclasses import dataclass\\n\\nfrom .profile import Profile\\n\\n\\n@dataclass\\nclass TrainingStrategy:\\n    headline: str\\n    detail: str\\n    progress: bool\\n\\n\\ndef next_chestpress_strategy(\\n    weight_kg: float, first_set_reps: int, profile: Profile\\n) -> TrainingStrategy:\\n    if first_set_reps >= profile.chestpress_rep_threshold:\\n        nxt = weight_kg + profile.chestpress_increment_kg\\n        return TrainingStrategy(\\n            headline=f\\\"漸進性過負荷フェーズへ（1セット目 {weight_kg:.1f}kg × {first_set_reps}回）\\\",\\n            detail=(\\n                f\\\"閾値{profile.chestpress_rep_threshold}回を達成。次回は2択：\\\\n\\\"\\n                f\\\"  A) インターバルを3分に延長して {weight_kg:.1f}kg を高強度維持\\\\n\\\"\\n                f\\\"  B) {nxt:.1f}kg へ増量し、まず1セット目6回を狙う\\\"\\n            ),\\n            progress=True,\\n        )\\n    return TrainingStrategy(\\n        headline=f\\\"積み上げフェーズ（1セット目 {weight_kg:.1f}kg × {first_set_reps}回）\\\",\\n        detail=(\\n            f\\\"閾値{profile.chestpress_rep_threshold}回まで現重量を継続。\\\"\\n            \\\"インターバルは2分、フォームを固めつつ1セット目のレップ数を伸ばす。\\\"\\n        ),\\n        progress=False,\\n    )\\n\", \"core/weight_logic.py\": \"\\\"\\\"\\\"体重ロジック：EMAでトレンドを抽出し、急減を「脱水/濃縮リスク」として検知。\\n\\n体重の前日比はノイズ（水分・グリコーゲン）が大きい。指数移動平均でトレンドを分離し、\\n前日比 −1.0kg もしくは −1.5% 以上の急減は「脂肪減ではなく脱水」と判定して警告する。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom dataclasses import dataclass, field\\nfrom typing import List, Optional\\n\\nfrom .models import WeightLog\\nfrom .profile import Profile\\n\\n\\ndef ema(values: List[float], span: int) -> Optional[float]:\\n    \\\"\\\"\\\"指数移動平均（最新値）。pandas非依存の純実装。\\\"\\\"\\\"\\n    if not values:\\n        return None\\n    alpha = 2.0 / (span + 1.0)\\n    e = values[0]\\n    for v in values[1:]:\\n        e = alpha * v + (1.0 - alpha) * e\\n    return e\\n\\n\\ndef ema_series(values: List[float], span: int) -> List[float]:\\n    \\\"\\\"\\\"各時点のEMA系列（グラフ用）。\\\"\\\"\\\"\\n    if not values:\\n        return []\\n    alpha = 2.0 / (span + 1.0)\\n    out = [values[0]]\\n    for v in values[1:]:\\n        out.append(alpha * v + (1.0 - alpha) * out[-1])\\n    return out\\n\\n\\n@dataclass\\nclass WeightInsight:\\n    latest_kg: float\\n    ema_kg: float\\n    prev_kg: Optional[float]\\n    delta_kg: Optional[float]\\n    rapid_drop: bool\\n    extra_water_ml: float\\n    alerts: List[str] = field(default_factory=list)\\n\\n\\ndef analyze_weight(history: List[WeightLog], profile: Profile) -> Optional[WeightInsight]:\\n    \\\"\\\"\\\"history は log_date 昇順を想定。\\\"\\\"\\\"\\n    if not history:\\n        return None\\n\\n    weights = [w.weight_kg for w in history]\\n    latest = weights[-1]\\n    e = ema(weights, profile.ema_span_days) or latest\\n    prev = weights[-2] if len(weights) >= 2 else None\\n    delta = (latest - prev) if prev is not None else None\\n\\n    rapid = False\\n    extra_water = 0.0\\n    alerts: List[str] = []\\n\\n    if delta is not None and prev is not None:\\n        threshold = max(profile.rapid_drop_kg, profile.rapid_drop_ratio * prev)\\n        if delta \u003c= -threshold:\\n            rapid = True\\n            # 失った分の多くは水分とみなし、半量を追加給水目安にする\\n            extra_water = abs(delta) * 1000.0 * 0.5\\n            alerts.append(\\n                f\\\"⚠ 前日比 {delta:+.1f}kg の急減。脂肪減ではなく脱水/グリコーゲン減の可能性。\\\"\\n                f\\\"血液が濃縮し尿酸値が上がりやすい状態です。本日は約{extra_water:.0f}mlを\\\"\\n                \\\"意識的に追加給水してください。\\\"\\n            )\\n\\n    if delta is not None and delta >= profile.rapid_drop_kg:\\n        alerts.append(\\n            f\\\"前日比 {delta:+.1f}kg の急増。塩分・糖質による水分貯留の可能性。\\\"\\n            \\\"焦らずトレンド(EMA)で判断を。\\\"\\n        )\\n\\n    return WeightInsight(\\n        latest_kg=latest,\\n        ema_kg=e,\\n        prev_kg=prev,\\n        delta_kg=delta,\\n        rapid_drop=rapid,\\n        extra_water_ml=extra_water,\\n        alerts=alerts,\\n    )\\n\", \"db/__init__.py\": \"\\\"\\\"\\\"永続化層（SQLite）。coreに依存しない薄いCRUDのみを持つ。\\\"\\\"\\\"\\n\", \"db/browser_persist.py\": \"\\\"\\\"\\\"ブラウザ(stlite)版のデータ永続化。\\n\\nstlite は Python(Pyodide) を **Web Worker 内**で実行するため、`localStorage` は\\nWorker から参照できない。代わりに stlite 公式の `idbfsMountpoints`（IndexedDB を\\nバックエンドにした永続ファイルシステム = IDBFS）を使う。\\n\\n- 起動時の読み込み（IndexedDB → /mnt）は stlite が自動で行う。\\n- 書き込み後に `FS.syncfs(False)` を呼び、/mnt の変更を IndexedDB へ書き戻す。\\n\\nデスクトップ（通常のPython）では `js` モジュールが無いので全て no-op になり、\\n従来通り `data/healthlog.db` がそのまま永続化される。\\n失敗してもアプリは止めない（最悪その回の同期が飛ぶだけ）。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\n# stlite の mount({ idbfsMountpoints: [\\\"/mnt\\\"] }) と対応。DBはこの永続ディレクトリに置く。\\nMOUNT_DIR = \\\"/mnt\\\"\\nDB_PATH = MOUNT_DIR + \\\"/healthlog.db\\\"\\n\\n_noop = None\\n\\n\\ndef is_browser() -> bool:\\n    \\\"\\\"\\\"stlite(Pyodide)上で動作しているか。\\\"\\\"\\\"\\n    try:\\n        import js  # noqa: F401\\n        return True\\n    except ImportError:\\n        return False\\n\\n\\ndef _get_noop():\\n    global _noop\\n    if _noop is None:\\n        from pyodide.code import run_js\\n        _noop = run_js(\\\"(e)=>{}\\\")\\n    return _noop\\n\\n\\ndef flush() -> None:\\n    \\\"\\\"\\\"/mnt の変更を IndexedDB へ同期する（書き込み直後に呼ぶ）。\\n\\n    syncfs は非同期だが、保存用途では発火だけで十分。例外は握りつぶす。\\n    \\\"\\\"\\\"\\n    try:\\n        import pyodide_js\\n        pyodide_js.FS.syncfs(False, _get_noop())\\n    except Exception:\\n        pass\\n\", \"db/repository.py\": \"\\\"\\\"\\\"SQLite リポジトリ。events / weight_logs / workouts のCRUD。\\n\\ncoreのdataclassを入出力に使うが、core側はこの層を知らない（依存は一方向）。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nimport dataclasses\\nimport os\\nimport sqlite3\\nfrom contextlib import contextmanager\\nfrom datetime import date, datetime\\nfrom typing import Callable, Iterator, List, Optional\\n\\nfrom core.models import Event, TrainingNote, WeightLog, Workout\\nfrom core.presets import Preset\\nfrom core.profile import DEFAULT_PROFILE, Profile\\n\\nDEFAULT_DB_PATH = os.path.join(\\n    os.path.dirname(os.path.dirname(os.path.abspath(__file__))), \\\"data\\\", \\\"healthlog.db\\\"\\n)\\n\\n# 「よく使う項目」の登録上限。多すぎるとプルダウンが煩雑になるため上限を設ける。\\nMAX_CUSTOM_PRESETS = 15\\n\\n\\nclass Repository:\\n    def __init__(self, db_path: str = DEFAULT_DB_PATH,\\n                 on_write: Optional[Callable[[], None]] = None):\\n        self.db_path = db_path\\n        # on_write はブラウザ(stlite)版でのみ使用：書き込み直後に localStorage へ\\n        # DBを退避する。デスクトップ版では None（ファイルがそのまま永続化される）。\\n        self._on_write = on_write\\n        os.makedirs(os.path.dirname(db_path), exist_ok=True)\\n        self._init_schema()\\n\\n    def _connect(self) -> sqlite3.Connection:\\n        conn = sqlite3.connect(self.db_path)\\n        conn.row_factory = sqlite3.Row\\n        return conn\\n\\n    def _notify(self) -> None:\\n        if self._on_write is not None:\\n            self._on_write()\\n\\n    @contextmanager\\n    def _write_tx(self) -> Iterator[sqlite3.Connection]:\\n        \\\"\\\"\\\"書き込み用トランザクション。成功コミット後に on_write を発火する。\\n\\n        st.rerun() がスクリプトを中断する前に永続化を済ませる必要があるため、\\n        書き込みの瞬間に保存する（読み取りでは発火しない）。\\n        \\\"\\\"\\\"\\n        conn = self._connect()\\n        try:\\n            yield conn\\n            conn.commit()\\n        except Exception:\\n            conn.rollback()\\n            raise\\n        finally:\\n            conn.close()\\n        self._notify()\\n\\n    def _init_schema(self) -> None:\\n        with self._connect() as conn:\\n            conn.executescript(\\n                \\\"\\\"\\\"\\n                CREATE TABLE IF NOT EXISTS events (\\n                    id INTEGER PRIMARY KEY AUTOINCREMENT,\\n                    name TEXT NOT NULL,\\n                    eaten_at TEXT NOT NULL,\\n                    salt_g REAL DEFAULT 0,\\n                    carb_g REAL DEFAULT 0,\\n                    fat_g REAL DEFAULT 0,\\n                    protein_g REAL DEFAULT 0,\\n                    alcohol_g REAL DEFAULT 0,\\n                    note TEXT DEFAULT ''\\n                );\\n                CREATE TABLE IF NOT EXISTS weight_logs (\\n                    id INTEGER PRIMARY KEY AUTOINCREMENT,\\n                    log_date TEXT NOT NULL UNIQUE,\\n                    weight_kg REAL NOT NULL,\\n                    waist_cm REAL\\n                );\\n                CREATE TABLE IF NOT EXISTS workouts (\\n                    id INTEGER PRIMARY KEY AUTOINCREMENT,\\n                    log_date TEXT NOT NULL,\\n                    exercise TEXT NOT NULL,\\n                    weight_kg REAL DEFAULT 0,\\n                    reps INTEGER DEFAULT 0,\\n                    sets INTEGER DEFAULT 1,\\n                    note TEXT DEFAULT ''\\n                );\\n                CREATE TABLE IF NOT EXISTS training_notes (\\n                    id INTEGER PRIMARY KEY AUTOINCREMENT,\\n                    log_date TEXT NOT NULL UNIQUE,\\n                    body TEXT NOT NULL DEFAULT ''\\n                );\\n                CREATE TABLE IF NOT EXISTS custom_presets (\\n                    id INTEGER PRIMARY KEY AUTOINCREMENT,\\n                    label TEXT NOT NULL,\\n                    category TEXT NOT NULL,\\n                    salt_g REAL DEFAULT 0,\\n                    carb_g REAL DEFAULT 0,\\n                    fat_g REAL DEFAULT 0,\\n                    protein_g REAL DEFAULT 0,\\n                    alcohol_g REAL DEFAULT 0\\n                );\\n                CREATE TABLE IF NOT EXISTS profile (\\n                    id INTEGER PRIMARY KEY CHECK (id = 1),\\n                    name TEXT,\\n                    age INTEGER,\\n                    height_cm REAL,\\n                    weight_kg REAL,\\n                    target_weight_kg REAL,\\n                    waist_cm REAL\\n                );\\n                CREATE TABLE IF NOT EXISTS daily_water (\\n                    day TEXT PRIMARY KEY,\\n                    consumed_ml INTEGER NOT NULL DEFAULT 0\\n                );\\n                \\\"\\\"\\\"\\n            )\\n\\n    # ---------- events ----------\\n    def add_event(self, event: Event) -> int:\\n        with self._write_tx() as conn:\\n            cur = conn.execute(\\n                \\\"\\\"\\\"INSERT INTO events\\n                   (name, eaten_at, salt_g, carb_g, fat_g, protein_g, alcohol_g, note)\\n                   VALUES (?, ?, ?, ?, ?, ?, ?, ?)\\\"\\\"\\\",\\n                (event.name, event.eaten_at.isoformat(), event.salt_g, event.carb_g,\\n                 event.fat_g, event.protein_g, event.alcohol_g, event.note),\\n            )\\n            return int(cur.lastrowid)\\n\\n    def events_on(self, day: date) -> List[Event]:\\n        start = datetime.combine(day, datetime.min.time())\\n        end = datetime.combine(day, datetime.max.time())\\n        with self._connect() as conn:\\n            rows = conn.execute(\\n                \\\"SELECT * FROM events WHERE eaten_at BETWEEN ? AND ? ORDER BY eaten_at\\\",\\n                (start.isoformat(), end.isoformat()),\\n            ).fetchall()\\n        return [self._row_to_event(r) for r in rows]\\n\\n    def recent_events(self, limit: int = 50) -> List[Event]:\\n        with self._connect() as conn:\\n            rows = conn.execute(\\n                \\\"SELECT * FROM events ORDER BY eaten_at DESC LIMIT ?\\\", (limit,)\\n            ).fetchall()\\n        return [self._row_to_event(r) for r in rows]\\n\\n    def delete_event(self, event_id: int) -> None:\\n        with self._write_tx() as conn:\\n            conn.execute(\\\"DELETE FROM events WHERE id = ?\\\", (event_id,))\\n\\n    def update_event_time(self, event_id: int, eaten_at: datetime) -> None:\\n        with self._write_tx() as conn:\\n            conn.execute(\\n                \\\"UPDATE events SET eaten_at = ? WHERE id = ?\\\",\\n                (eaten_at.isoformat(), event_id),\\n            )\\n\\n    @staticmethod\\n    def _row_to_event(r: sqlite3.Row) -> Event:\\n        return Event(\\n            id=r[\\\"id\\\"], name=r[\\\"name\\\"], eaten_at=datetime.fromisoformat(r[\\\"eaten_at\\\"]),\\n            salt_g=r[\\\"salt_g\\\"], carb_g=r[\\\"carb_g\\\"], fat_g=r[\\\"fat_g\\\"],\\n            protein_g=r[\\\"protein_g\\\"], alcohol_g=r[\\\"alcohol_g\\\"], note=r[\\\"note\\\"],\\n        )\\n\\n    # ---------- weight ----------\\n    def upsert_weight(self, log: WeightLog) -> None:\\n        with self._write_tx() as conn:\\n            conn.execute(\\n                \\\"\\\"\\\"INSERT INTO weight_logs (log_date, weight_kg, waist_cm)\\n                   VALUES (?, ?, ?)\\n                   ON CONFLICT(log_date) DO UPDATE SET\\n                       weight_kg = excluded.weight_kg,\\n                       waist_cm = excluded.waist_cm\\\"\\\"\\\",\\n                (log.log_date.isoformat(), log.weight_kg, log.waist_cm),\\n            )\\n\\n    def weight_history(self) -> List[WeightLog]:\\n        with self._connect() as conn:\\n            rows = conn.execute(\\n                \\\"SELECT * FROM weight_logs ORDER BY log_date\\\"\\n            ).fetchall()\\n        return [\\n            WeightLog(\\n                id=r[\\\"id\\\"], log_date=date.fromisoformat(r[\\\"log_date\\\"]),\\n                weight_kg=r[\\\"weight_kg\\\"], waist_cm=r[\\\"waist_cm\\\"],\\n            )\\n            for r in rows\\n        ]\\n\\n    # ---------- workouts ----------\\n    def add_workout(self, w: Workout) -> int:\\n        with self._write_tx() as conn:\\n            cur = conn.execute(\\n                \\\"\\\"\\\"INSERT INTO workouts (log_date, exercise, weight_kg, reps, sets, note)\\n                   VALUES (?, ?, ?, ?, ?, ?)\\\"\\\"\\\",\\n                (w.log_date.isoformat(), w.exercise, w.weight_kg, w.reps, w.sets, w.note),\\n            )\\n            return int(cur.lastrowid)\\n\\n    def workouts(self, exercise: Optional[str] = None) -> List[Workout]:\\n        with self._connect() as conn:\\n            if exercise:\\n                rows = conn.execute(\\n                    \\\"SELECT * FROM workouts WHERE exercise = ? ORDER BY log_date\\\",\\n                    (exercise,),\\n                ).fetchall()\\n            else:\\n                rows = conn.execute(\\n                    \\\"SELECT * FROM workouts ORDER BY log_date\\\"\\n                ).fetchall()\\n        return [\\n            Workout(\\n                id=r[\\\"id\\\"], log_date=date.fromisoformat(r[\\\"log_date\\\"]),\\n                exercise=r[\\\"exercise\\\"], weight_kg=r[\\\"weight_kg\\\"], reps=r[\\\"reps\\\"],\\n                sets=r[\\\"sets\\\"], note=r[\\\"note\\\"],\\n            )\\n            for r in rows\\n        ]\\n\\n    # ---------- training notes (1日1件のフリーメモ) ----------\\n    def upsert_training_note(self, log_date: date, body: str) -> None:\\n        with self._write_tx() as conn:\\n            if body.strip():\\n                conn.execute(\\n                    \\\"\\\"\\\"INSERT INTO training_notes (log_date, body)\\n                       VALUES (?, ?)\\n                       ON CONFLICT(log_date) DO UPDATE SET body = excluded.body\\\"\\\"\\\",\\n                    (log_date.isoformat(), body),\\n                )\\n            else:\\n                # 空で保存したら削除（メモを消す操作）\\n                conn.execute(\\n                    \\\"DELETE FROM training_notes WHERE log_date = ?\\\",\\n                    (log_date.isoformat(),),\\n                )\\n\\n    def training_note_on(self, log_date: date) -> str:\\n        with self._connect() as conn:\\n            row = conn.execute(\\n                \\\"SELECT body FROM training_notes WHERE log_date = ?\\\",\\n                (log_date.isoformat(),),\\n            ).fetchone()\\n        return row[\\\"body\\\"] if row else \\\"\\\"\\n\\n    def recent_training_notes(self, limit: int = 30) -> List[TrainingNote]:\\n        with self._connect() as conn:\\n            rows = conn.execute(\\n                \\\"SELECT * FROM training_notes ORDER BY log_date DESC LIMIT ?\\\", (limit,)\\n            ).fetchall()\\n        return [\\n            TrainingNote(\\n                id=r[\\\"id\\\"], log_date=date.fromisoformat(r[\\\"log_date\\\"]), body=r[\\\"body\\\"]\\n            )\\n            for r in rows\\n        ]\\n\\n    # ---------- daily water (本日の水分。ホーム/デトックスで共有する単一の合計) ----------\\n    def get_consumed_water(self, day: date) -> int:\\n        \\\"\\\"\\\"その日に飲んだ水分の合計(ml)。記録が無ければ0。\\\"\\\"\\\"\\n        with self._connect() as conn:\\n            row = conn.execute(\\n                \\\"SELECT consumed_ml FROM daily_water WHERE day = ?\\\", (day.isoformat(),)\\n            ).fetchone()\\n        return int(row[\\\"consumed_ml\\\"]) if row else 0\\n\\n    def set_consumed_water(self, day: date, ml: int) -> None:\\n        ml = max(0, int(ml))\\n        with self._write_tx() as conn:\\n            conn.execute(\\n                \\\"\\\"\\\"INSERT INTO daily_water (day, consumed_ml) VALUES (?, ?)\\n                   ON CONFLICT(day) DO UPDATE SET consumed_ml = excluded.consumed_ml\\\"\\\"\\\",\\n                (day.isoformat(), ml),\\n            )\\n\\n    def add_consumed_water(self, day: date, delta: int) -> int:\\n        \\\"\\\"\\\"水分を加算してDBへ永続化（リロードでも消えない）。新しい合計を返す。\\\"\\\"\\\"\\n        new_total = max(0, self.get_consumed_water(day) + int(delta))\\n        self.set_consumed_water(day, new_total)\\n        return new_total\\n\\n    # ---------- custom presets (よく使う項目の登録) ----------\\n    def custom_preset_count(self) -> int:\\n        with self._connect() as conn:\\n            row = conn.execute(\\\"SELECT COUNT(*) AS c FROM custom_presets\\\").fetchone()\\n        return int(row[\\\"c\\\"])\\n\\n    def add_custom_preset(self, label: str, category: str, *, salt_g: float = 0.0,\\n                          carb_g: float = 0.0, fat_g: float = 0.0,\\n                          protein_g: float = 0.0, alcohol_g: float = 0.0) -> int:\\n        with self._write_tx() as conn:\\n            count = conn.execute(\\n                \\\"SELECT COUNT(*) AS c FROM custom_presets\\\"\\n            ).fetchone()[\\\"c\\\"]\\n            if count >= MAX_CUSTOM_PRESETS:\\n                raise ValueError(\\n                    f\\\"「よく使う項目」は最大{MAX_CUSTOM_PRESETS}件までです。\\\"\\n                    \\\"不要な項目を削除してください。\\\"\\n                )\\n            cur = conn.execute(\\n                \\\"\\\"\\\"INSERT INTO custom_presets\\n                   (label, category, salt_g, carb_g, fat_g, protein_g, alcohol_g)\\n                   VALUES (?, ?, ?, ?, ?, ?, ?)\\\"\\\"\\\",\\n                (label, category, salt_g, carb_g, fat_g, protein_g, alcohol_g),\\n            )\\n            new_id = int(cur.lastrowid)\\n        return new_id\\n\\n    def list_custom_presets(self) -> List[Preset]:\\n        with self._connect() as conn:\\n            rows = conn.execute(\\n                \\\"SELECT * FROM custom_presets ORDER BY id\\\"\\n            ).fetchall()\\n        return [\\n            Preset(\\n                key=f\\\"custom_{r['id']}\\\", label=r[\\\"label\\\"], category=r[\\\"category\\\"],\\n                salt_g=r[\\\"salt_g\\\"], carb_g=r[\\\"carb_g\\\"], fat_g=r[\\\"fat_g\\\"],\\n                protein_g=r[\\\"protein_g\\\"], alcohol_g=r[\\\"alcohol_g\\\"], id=r[\\\"id\\\"],\\n            )\\n            for r in rows\\n        ]\\n\\n    def delete_custom_preset(self, preset_id: int) -> None:\\n        with self._write_tx() as conn:\\n            conn.execute(\\\"DELETE FROM custom_presets WHERE id = ?\\\", (preset_id,))\\n\\n    # ---------- profile (1行のみ。未設定なら DEFAULT_PROFILE) ----------\\n    def get_profile(self) -> Profile:\\n        with self._connect() as conn:\\n            row = conn.execute(\\\"SELECT * FROM profile WHERE id = 1\\\").fetchone()\\n        if row is None:\\n            return DEFAULT_PROFILE\\n        # 編集可能な基本ステータスのみ差し替え、生理係数は既定値を維持\\n        return dataclasses.replace(\\n            DEFAULT_PROFILE,\\n            name=row[\\\"name\\\"], age=row[\\\"age\\\"], height_cm=row[\\\"height_cm\\\"],\\n            weight_kg=row[\\\"weight_kg\\\"], target_weight_kg=row[\\\"target_weight_kg\\\"],\\n            waist_cm=row[\\\"waist_cm\\\"],\\n        )\\n\\n    def effective_profile(self) -> Profile:\\n        \\\"\\\"\\\"計算に使うプロフィール。体重は『毎朝の体重』の最新値で上書きする\\n        （ログが無ければ保存済みの初期値を使う）。\\\"\\\"\\\"\\n        p = self.get_profile()\\n        history = self.weight_history()\\n        if history:\\n            p = dataclasses.replace(p, weight_kg=history[-1].weight_kg)\\n        return p\\n\\n    def save_profile(self, *, name: str, age: int, height_cm: float, weight_kg: float,\\n                     target_weight_kg: float, waist_cm: float) -> None:\\n        with self._write_tx() as conn:\\n            conn.execute(\\n                \\\"\\\"\\\"INSERT INTO profile\\n                   (id, name, age, height_cm, weight_kg, target_weight_kg, waist_cm)\\n                   VALUES (1, ?, ?, ?, ?, ?, ?)\\n                   ON CONFLICT(id) DO UPDATE SET\\n                       name = excluded.name,\\n                       age = excluded.age,\\n                       height_cm = excluded.height_cm,\\n                       weight_kg = excluded.weight_kg,\\n                       target_weight_kg = excluded.target_weight_kg,\\n                       waist_cm = excluded.waist_cm\\\"\\\"\\\",\\n                (name, age, height_cm, weight_kg, target_weight_kg, waist_cm),\\n            )\\n\", \"ui/__init__.py\": \"\\\"\\\"\\\"Streamlit表示層。core(計算)とdb(永続化)を呼び出すだけの薄い層。\\\"\\\"\\\"\\n\", \"ui/components.py\": \"\\\"\\\"\\\"共通UI部品。スマホ幅で見やすいシンプルな表示に統一する。\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom datetime import date, datetime\\nfrom typing import List\\n\\nimport streamlit as st\\n\\nfrom core.hydration import WaterSlot\\nfrom core.presets import Preset\\n\\n\\ndef get_consumed_ml(repo, day: date) -> int:\\n    \\\"\\\"\\\"本日の水分(ml)。DBに永続化された単一の合計を返す（リロードでも消えない）。\\n    ホームもデトックスも同じこの値を読み書きするため、両画面が常に一致する。\\\"\\\"\\\"\\n    return repo.get_consumed_water(day)\\n\\n\\ndef add_consumed_ml(repo, day: date, amount: int) -> None:\\n    repo.add_consumed_water(day, amount)\\n\\n\\ndef reset_consumed_ml(repo, day: date) -> None:\\n    repo.set_consumed_water(day, 0)\\n\\n\\ndef progress_block(label: str, value: float, total: float, unit: str = \\\"ml\\\") -> None:\\n    total = max(total, 1.0)\\n    ratio = min(value / total, 1.0)\\n    st.markdown(f\\\"**{label}**　{value:.0f} / {total:.0f} {unit}（{ratio*100:.0f}%）\\\")\\n    st.progress(ratio)\\n\\n\\ndef alert_banner(messages: List[str]) -> None:\\n    for m in messages:\\n        if m.startswith(\\\"⚠\\\"):\\n            st.error(m)\\n        else:\\n            st.warning(m)\\n\\n\\ndef schedule_table(slots: List[WaterSlot]) -> None:\\n    if not slots:\\n        st.info(\\\"追加で飲むべき水分はありません。\\\")\\n        return\\n    rows = []\\n    for s in slots:\\n        rows.append(\\n            {\\n                \\\"時刻\\\": s.at.strftime(\\\"%H:%M\\\"),\\n                \\\"量(ml)\\\": s.amount_ml,\\n                \\\"種別\\\": \\\"しっかり\\\" if s.kind == \\\"heavy\\\" else \\\"少量\\\",\\n                \\\"メモ\\\": s.note,\\n            }\\n        )\\n    st.dataframe(rows, hide_index=True, width='stretch')\\n\\n\\ndef presets_for(repo, category: str) -> List[Preset]:\\n    \\\"\\\"\\\"ユーザーが「よく使う項目」に登録したプリセットのみ（カテゴリ別）。\\n\\n    組み込みの既定プリセット（二郎/生ビール等）は表示しない方針。\\n    \\\"\\\"\\\"\\n    return [p for p in repo.list_custom_presets() if p.category == category]\\n\\n\\ndef disclaimer() -> None:\\n    st.caption(\\n        \\\"※ 本アプリは医療機器ではなく、理詰めの目安を出す意思決定支援ツールです。\\\"\\n        \\\"係数は一般的なヒューリスティックで、体調に異常があれば医療機関へ。\\\"\\n    )\\n\", \"ui/pages/__init__.py\": \"\", \"ui/pages/detox.py\": \"\\\"\\\"\\\"③ アルコール・塩分デトックス・トラッカー専用画面。\\n\\n飲酒・高塩分の入力をトリガーに「水で押し出す」翌朝までの補給量を算出し、進捗を可視化する。\\n\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom datetime import date, datetime\\n\\nimport streamlit as st\\n\\nfrom core import detox\\nfrom core.models import Event\\nfrom db.repository import Repository\\nfrom core.profile import Profile\\nfrom ui import components\\n\\n\\ndef render(repo: Repository, profile: Profile) -> None:\\n    st.header(\\\"🚿 アルコール・塩分デトックス\\\")\\n    st.write(\\\"飲酒・高塩分をワンタップ入力 → 翌朝までに「水で押し出す」補給量と進捗を可視化します。\\\")\\n\\n    today = date.today()\\n\\n    # --- 入力（飲酒・高塩分：よく使う項目はプルダウンから） ---\\n    drinks = components.presets_for(repo, \\\"drink\\\")\\n    if drinks:\\n        st.markdown(\\\"**🍺 飲酒（よく使う項目）**\\\")\\n        dlabels = [p.label for p in drinks]\\n        di = st.selectbox(\\\"飲酒を選ぶ\\\", range(len(drinks)),\\n                          format_func=lambda i: dlabels[i], key=\\\"detox_drink_sel\\\",\\n                          label_visibility=\\\"collapsed\\\")\\n        if st.button(\\\"＋ 飲酒を記録\\\", key=\\\"detox_drink_add\\\", width='stretch'):\\n            repo.add_event(drinks[di].to_event(datetime.now()))\\n            st.toast(f\\\"記録：{drinks[di].label}\\\")\\n            st.rerun()\\n\\n    saltys = components.presets_for(repo, \\\"salty\\\")\\n    if saltys:\\n        st.markdown(\\\"**🧂 高塩分（よく使う項目）**\\\")\\n        slabels = [p.label for p in saltys]\\n        si = st.selectbox(\\\"高塩分を選ぶ\\\", range(len(saltys)),\\n                          format_func=lambda i: slabels[i], key=\\\"detox_salty_sel\\\",\\n                          label_visibility=\\\"collapsed\\\")\\n        if st.button(\\\"＋ 高塩分を記録\\\", key=\\\"detox_salty_add\\\", width='stretch'):\\n            repo.add_event(saltys[si].to_event(datetime.now()))\\n            st.toast(f\\\"記録：{saltys[si].label}\\\")\\n            st.rerun()\\n\\n    with st.expander(\\\"＋ 自由入力（杯数・塩分を直接）\\\"):\\n        with st.form(\\\"free_detox\\\"):\\n            name = st.text_input(\\\"名称\\\", \\\"\\\")\\n            c1, c2 = st.columns(2)\\n            alcohol = c1.number_input(\\\"アルコール g\\\", 0.0, 200.0, 0.0, 2.0,\\n                                      help=\\\"生中≒20g / ハイボール≒16g / 日本酒1合≒22g\\\")\\n            salt = c2.number_input(\\\"塩分 g\\\", 0.0, 50.0, 0.0, 0.5)\\n            if st.form_submit_button(\\\"記録する\\\") and name:\\n                repo.add_event(Event(name=name, eaten_at=datetime.now(),\\n                                     alcohol_g=alcohol, salt_g=salt))\\n                st.toast(f\\\"記録：{name}\\\")\\n                st.rerun()\\n\\n    st.divider()\\n\\n    # --- デトックス対象イベント ---\\n    events = repo.events_on(today)\\n    target_events = [e for e in events if e.alcohol_g > 0 or e.salt_g > 0]\\n    plan = detox.build_detox_plan(target_events, profile)\\n\\n    if not target_events:\\n        st.info(\\\"本日の飲酒・高塩分の記録はまだありません。上のボタンから入力してください。\\\")\\n        components.disclaimer()\\n        return\\n\\n    st.subheader(\\\"対象イベント\\\")\\n    for e in target_events:\\n        st.write(\\n            f\\\"{e.eaten_at.strftime('%H:%M')}　**{e.name}**　\\\"\\n            f\\\"(アルコール {e.alcohol_g:.0f}g / 塩分 {e.salt_g:.0f}g)\\\"\\n        )\\n\\n    st.divider()\\n\\n    # --- 押し出し必要量 ＋ 進捗 ---\\n    st.subheader(\\\"🚿 翌朝までの押し出し水分\\\")\\n    flush_target = plan.flush_water_ml\\n    consumed = components.get_consumed_ml(repo, today)\\n    components.progress_block(\\\"本日の水分（押し出し進捗）\\\", consumed, flush_target)\\n    st.caption(\\\"ここで足した水分は「本日の水分」と共有され、ホーム画面にも反映されます。\\\")\\n\\n    c1, c2 = st.columns(2)\\n    c1.metric(\\\"🍺 アルコール\\\", f\\\"{plan.alcohol_g:.0f} g\\\")\\n    c2.metric(\\\"🧂 塩分\\\", f\\\"{plan.salt_g:.0f} g\\\")\\n    st.caption(plan.note)\\n\\n    cols = st.columns(4)\\n    if cols[0].button(\\\"+200\\\", key=\\\"dx200\\\", width='stretch'):\\n        components.add_consumed_ml(repo, today, 200); st.rerun()\\n    if cols[1].button(\\\"+350\\\", key=\\\"dx350\\\", width='stretch'):\\n        components.add_consumed_ml(repo, today, 350); st.rerun()\\n    if cols[2].button(\\\"+500\\\", key=\\\"dx500\\\", width='stretch'):\\n        components.add_consumed_ml(repo, today, 500); st.rerun()\\n    if cols[3].button(\\\"リセット\\\", key=\\\"dxreset\\\", width='stretch'):\\n        components.reset_consumed_ml(repo, today); st.rerun()\\n\\n    remaining = max(0, flush_target - consumed)\\n    if remaining \u003c= 0:\\n        st.success(\\\"押し出し完了。翌朝の濃縮リスクは十分にケアできています。\\\")\\n    else:\\n        st.metric(\\\"残り\\\", f\\\"{remaining:.0f} ml\\\")\\n\\n    # --- 翌朝までのスケジュール ---\\n    st.subheader(\\\"⏱ いつ飲むか（睡眠を妨げない配分）\\\")\\n    stages = detox.build_detox_schedule(flush_target, profile)\\n    if stages:\\n        st.dataframe(\\n            [{\\\"タイミング\\\": s.label, \\\"量(ml)\\\": s.amount_ml, \\\"ポイント\\\": s.note} for s in stages],\\n            hide_index=True, width='stretch',\\n        )\\n\\n    components.disclaimer()\\n\", \"ui/pages/history.py\": \"\\\"\\\"\\\"ログ＆グラフ：体重/腹囲の推移、イベント履歴。\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nimport altair as alt\\nimport pandas as pd\\nimport streamlit as st\\n\\nfrom core import weight_logic\\nfrom db.repository import Repository\\nfrom core.profile import Profile\\n\\n\\ndef _weight_chart(history, profile: Profile):\\n    weights = [w.weight_kg for w in history]\\n    ema = weight_logic.ema_series(weights, profile.ema_span_days)\\n    df = pd.DataFrame({\\n        \\\"日付\\\": [w.log_date for w in history],\\n        \\\"実測\\\": weights,\\n        \\\"トレンド(EMA)\\\": ema,\\n    })\\n    long = df.melt(\\\"日付\\\", var_name=\\\"系列\\\", value_name=\\\"kg\\\")\\n    chart = (\\n        alt.Chart(long)\\n        .mark_line(point=True)\\n        .encode(\\n            x=alt.X(\\\"日付:T\\\", title=\\\"\\\"),\\n            y=alt.Y(\\\"kg:Q\\\", scale=alt.Scale(zero=False), title=\\\"体重 (kg)\\\"),\\n            color=alt.Color(\\\"系列:N\\\", title=\\\"\\\"),\\n        )\\n        .properties(height=280)\\n    )\\n    return chart\\n\\n\\ndef render(repo: Repository, profile: Profile) -> None:\\n    st.header(\\\"📈 ログ ＆ グラフ\\\")\\n\\n    history = repo.weight_history()\\n    if history:\\n        st.subheader(\\\"体重の推移\\\")\\n        st.altair_chart(_weight_chart(history, profile), width='stretch')\\n    else:\\n        st.info(\\\"体重ログがありません。『毎朝の体重報告』から入力してください。\\\")\\n\\n    st.divider()\\n    st.subheader(\\\"最近の飲食イベント\\\")\\n    events = repo.recent_events(30)\\n    if events:\\n        st.dataframe(\\n            [\\n                {\\n                    \\\"日時\\\": e.eaten_at.strftime(\\\"%m/%d %H:%M\\\"),\\n                    \\\"内容\\\": e.name,\\n                    \\\"塩(g)\\\": e.salt_g, \\\"糖(g)\\\": e.carb_g, \\\"脂(g)\\\": e.fat_g,\\n                    \\\"Pro(g)\\\": e.protein_g, \\\"Alc(g)\\\": e.alcohol_g,\\n                }\\n                for e in events\\n            ],\\n            hide_index=True, width='stretch',\\n        )\\n    else:\\n        st.info(\\\"イベント履歴はまだありません。\\\")\\n\", \"ui/pages/home.py\": \"\\\"\\\"\\\"ホーム / 今日のダッシュボード：水分進捗・アラート・次に飲むべき量を1枚で。\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom datetime import date, datetime\\n\\nimport streamlit as st\\n\\nfrom core import hydration, weight_logic\\nfrom db.repository import Repository\\nfrom core.profile import Profile\\nfrom ui import components\\n\\n\\ndef render(repo: Repository, profile: Profile) -> None:\\n    st.header(f\\\"🏠 {profile.name} の今日\\\")\\n    st.caption(date.today().strftime(\\\"%Y-%m-%d (%a)\\\"))\\n\\n    today = date.today()\\n    events = repo.events_on(today)\\n    debt = hydration.compute_water_debt(events, profile)\\n    target = debt.total_ml\\n    consumed = components.get_consumed_ml(repo, today)\\n\\n    # --- 急減アラート（体重） ---\\n    insight = weight_logic.analyze_weight(repo.weight_history(), profile)\\n    if insight and insight.alerts:\\n        components.alert_banner(insight.alerts)\\n\\n    # --- 水分進捗 ---\\n    st.subheader(\\\"💧 水分\\\")\\n    components.progress_block(\\\"本日の水分\\\", consumed, target)\\n    c1, c2, c3, c4 = st.columns(4)\\n    if c1.button(\\\"+200\\\", width='stretch'):\\n        components.add_consumed_ml(repo, today, 200); st.rerun()\\n    if c2.button(\\\"+350\\\", width='stretch'):\\n        components.add_consumed_ml(repo, today, 350); st.rerun()\\n    if c3.button(\\\"+500\\\", width='stretch'):\\n        components.add_consumed_ml(repo, today, 500); st.rerun()\\n    if c4.button(\\\"リセット\\\", width='stretch'):\\n        components.reset_consumed_ml(repo, today); st.rerun()\\n\\n    remaining = max(0, target - consumed)\\n    st.metric(\\\"残り\\\", f\\\"{remaining:.0f} ml\\\")\\n\\n    # --- 次に飲むべき ---\\n    st.subheader(\\\"⏭ 次のひと口\\\")\\n    slots = hydration.build_schedule(target, consumed, datetime.now(), profile)\\n    next_heavy = next((s for s in slots if s.kind == \\\"heavy\\\"), None)\\n    if next_heavy:\\n        st.info(f\\\"**{next_heavy.at.strftime('%H:%M')} までに {next_heavy.amount_ml}ml** を目安に。\\\")\\n    elif slots:\\n        st.info(\\\"打ち切り時刻を過ぎています。就寝まで少量だけにして夜間頻尿を回避。\\\")\\n    else:\\n        st.success(\\\"本日の水分は達成済み。お疲れさまです。\\\")\\n\\n    st.divider()\\n\\n    # --- 本日の摂取サマリー ---\\n    st.subheader(\\\"🍽 本日の摂取\\\")\\n    if events:\\n        s1, s2, s3 = st.columns(3)\\n        s1.metric(\\\"記録\\\", f\\\"{len(events)} 件\\\")\\n        s2.metric(\\\"塩分\\\", f\\\"{sum(e.salt_g for e in events):.0f} g\\\")\\n        s3.metric(\\\"アルコール\\\", f\\\"{sum(e.alcohol_g for e in events):.0f} g\\\")\\n        s4, s5, s6 = st.columns(3)\\n        s4.metric(\\\"糖質\\\", f\\\"{sum(e.carb_g for e in events):.0f} g\\\")\\n        s5.metric(\\\"脂質\\\", f\\\"{sum(e.fat_g for e in events):.0f} g\\\")\\n        s6.metric(\\\"タンパク\\\", f\\\"{sum(e.protein_g for e in events):.0f} g\\\")\\n    else:\\n        st.caption(\\\"まだ記録がありません。「⚡ 神リカバリー」から入力できます。\\\")\\n\\n    # --- 体重スナップショット ---\\n    st.subheader(\\\"⚖️ 体重\\\")\\n    if insight:\\n        w1, w2, w3 = st.columns(3)\\n        w1.metric(\\\"最新\\\", f\\\"{insight.latest_kg:.1f} kg\\\",\\n                  f\\\"{insight.delta_kg:+.1f}\\\" if insight.delta_kg is not None else None)\\n        w2.metric(\\\"トレンド(EMA)\\\", f\\\"{insight.ema_kg:.1f} kg\\\")\\n        w3.metric(\\\"目標\\\", f\\\"{profile.target_weight_kg:.1f} kg\\\")\\n    else:\\n        st.caption(\\\"「🌅 毎朝の体重」で記録すると、ここに推移が出ます。\\\")\\n\\n    components.disclaimer()\\n\", \"ui/pages/morning_log.py\": \"\\\"\\\"\\\"毎朝の体重報告：体重・腹囲を入力 → EMAトレンド・急減アラート・本日のベース水分。\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom datetime import date, datetime, timedelta\\n\\nimport streamlit as st\\n\\nfrom core import hydration, weight_logic\\nfrom core.models import WeightLog\\nfrom db.repository import Repository\\nfrom core.profile import Profile\\nfrom ui import components\\n\\n\\ndef render(repo: Repository, profile: Profile) -> None:\\n    st.header(\\\"🌅 毎朝の体重報告\\\")\\n\\n    history = repo.weight_history()\\n    last_weight = history[-1].weight_kg if history else profile.weight_kg\\n\\n    with st.form(\\\"morning\\\"):\\n        log_day = st.date_input(\\\"日付\\\", date.today())\\n        weight = st.number_input(\\\"体重 (kg)\\\", 40.0, 120.0, float(last_weight), 0.05, format=\\\"%.2f\\\")\\n        waist = st.number_input(\\\"腹囲 (cm) ※任意\\\", 50.0, 120.0, float(profile.waist_cm), 0.5)\\n        submitted = st.form_submit_button(\\\"記録する\\\", width='stretch')\\n        if submitted:\\n            repo.upsert_weight(WeightLog(log_date=log_day, weight_kg=weight, waist_cm=waist))\\n            st.toast(\\\"体重を記録しました\\\")\\n            st.rerun()\\n\\n    history = repo.weight_history()\\n    insight = weight_logic.analyze_weight(history, profile)\\n    if insight is None:\\n        st.info(\\\"まだ記録がありません。今朝の体重を入力してください。\\\")\\n        components.disclaimer()\\n        return\\n\\n    st.divider()\\n    c1, c2, c3 = st.columns(3)\\n    c1.metric(\\\"最新\\\", f\\\"{insight.latest_kg:.2f} kg\\\",\\n              f\\\"{insight.delta_kg:+.2f}\\\" if insight.delta_kg is not None else None)\\n    c2.metric(\\\"トレンド(EMA)\\\", f\\\"{insight.ema_kg:.2f} kg\\\")\\n    c3.metric(\\\"目標体重\\\", f\\\"{profile.target_weight_kg:.1f} kg\\\")\\n\\n    if insight.alerts:\\n        components.alert_banner(insight.alerts)\\n    else:\\n        st.success(\\\"体重変動は正常範囲。脱水リスクの兆候はありません。\\\")\\n\\n    st.divider()\\n    st.subheader(\\\"💧 本日のベース水分と繰越負債\\\")\\n    # 前夜（昨日）のイベントを繰り越して当日の必要水分に反映\\n    yesterday_events = repo.events_on(date.today() - timedelta(days=1))\\n    debt = hydration.compute_water_debt(yesterday_events, profile)\\n    carryover = debt.extra_ml + insight.extra_water_ml\\n    st.write(f\\\"ベース水分：**{debt.base_ml:.0f} ml**（体重{profile.weight_kg:.1f}kg × {profile.water_ml_per_kg:.0f}ml）\\\")\\n    if carryover > 0:\\n        st.warning(\\n            f\\\"前夜の塩分/アルコール＋急減分で **+{carryover:.0f} ml** の繰越負債があります。\\\"\\n            f\\\"本日の目標：約 **{debt.base_ml + carryover:.0f} ml**\\\"\\n        )\\n    else:\\n        st.info(\\\"繰越負債はありません。クリーンなスタートです。\\\")\\n\\n    components.disclaimer()\\n\", \"ui/pages/profile_page.py\": \"\\\"\\\"\\\"⚙️ プロフィール：個人の基本情報を自由に設定。水分・タンパク計算が自動連動する。\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nimport streamlit as st\\n\\nfrom db.repository import Repository\\nfrom core.profile import Profile\\n\\n\\ndef render(repo: Repository, profile: Profile) -> None:\\n    st.header(\\\"⚙️ プロフィール\\\")\\n    st.write(\\\"あなたの基本情報を設定します。水分量・タンパク目標などの計算は、ここの体重に自動で連動します。\\\")\\n\\n    has_log = bool(repo.weight_history())\\n\\n    with st.form(\\\"profile\\\"):\\n        name = st.text_input(\\\"名前\\\", profile.name)\\n        c1, c2 = st.columns(2)\\n        age = c1.number_input(\\\"年齢\\\", 10, 100, int(profile.age), 1)\\n        height = c2.number_input(\\\"身長 (cm)\\\", 120.0, 220.0, float(profile.height_cm), 0.5)\\n        c3, c4 = st.columns(2)\\n        if has_log:\\n            # 体重は「毎朝の体重」の最新値を自動反映（ここでは編集しない）\\n            c3.metric(\\\"現在の体重 (kg)\\\", f\\\"{profile.weight_kg:.1f}\\\")\\n            c3.caption(\\\"『毎朝の体重』の最新値を反映中\\\")\\n            weight = float(profile.weight_kg)\\n        else:\\n            weight = c3.number_input(\\\"現在の体重 (kg) ※初期値\\\", 35.0, 200.0,\\n                                     float(profile.weight_kg), 0.1, format=\\\"%.1f\\\")\\n        target = c4.number_input(\\\"目標体重 (kg)\\\", 35.0, 200.0, float(profile.target_weight_kg), 0.1,\\n                                 format=\\\"%.1f\\\")\\n        waist = st.number_input(\\\"腹囲 (cm) ※任意\\\", 50.0, 150.0, float(profile.waist_cm), 0.5)\\n\\n        if st.form_submit_button(\\\"保存\\\", width='stretch'):\\n            repo.save_profile(\\n                name=name, age=int(age), height_cm=height, weight_kg=weight,\\n                target_weight_kg=target, waist_cm=waist,\\n            )\\n            st.success(\\\"プロフィールを保存しました\\\")\\n            st.rerun()\\n\\n    if has_log:\\n        st.caption(\\\"💡 体重は「🌅 毎朝の体重」で記録した最新値が自動で使われます。\\\")\\n\\n    st.divider()\\n    st.subheader(\\\"この設定から自動計算される目安\\\")\\n    base_water = profile.weight_kg * profile.water_ml_per_kg\\n    protein = profile.weight_kg * profile.protein_g_per_kg\\n    bmi = profile.weight_kg / ((profile.height_cm / 100) ** 2)\\n    to_go = profile.weight_kg - profile.target_weight_kg\\n    c1, c2, c3 = st.columns(3)\\n    c1.metric(\\\"ベース水分\\\", f\\\"{base_water:.0f} ml/日\\\")\\n    c2.metric(\\\"タンパク目標\\\", f\\\"{protein:.0f} g/日\\\")\\n    c3.metric(\\\"BMI\\\", f\\\"{bmi:.1f}\\\")\\n    if to_go > 0:\\n        st.caption(f\\\"目標体重まであと {to_go:.1f} kg。\\\")\\n    elif to_go \u003c 0:\\n        st.caption(f\\\"目標体重を {abs(to_go):.1f} kg 下回っています。\\\")\\n    else:\\n        st.caption(\\\"目標体重に到達しています。\\\")\\n\\n    st.caption(\\n        \\\"※ 神リカバリーの生理係数（塩分1g→100ml 等）は固定の初期値です。\\\"\\n        \\\"高度な調整が必要な場合は core/profile.py で変更できます。\\\"\\n    )\\n\", \"ui/pages/recovery_sim.py\": \"\\\"\\\"\\\"神リカバリー・シミュレーター：イベント入力 → 給水スケジュール ＋ 引き算メニュー。\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom datetime import date, datetime\\n\\nimport streamlit as st\\n\\nfrom core import food_db, hydration, recovery\\nfrom core.models import Event\\nfrom db.repository import MAX_CUSTOM_PRESETS, Repository\\nfrom core.profile import Profile\\nfrom ui import components\\n\\n\\ndef _category_label(cat: str) -> str:\\n    return {\\\"meal\\\": \\\"🍜 食事\\\", \\\"drink\\\": \\\"🍺 飲酒\\\", \\\"salty\\\": \\\"🧂 高塩分\\\"}.get(cat, cat)\\n\\n\\ndef render(repo: Repository, profile: Profile) -> None:\\n    st.header(\\\"⚡ 神リカバリー・シミュレーター\\\")\\n    st.write(\\\"食べた/飲んだものをワンタップ。残り時間の給水と、夜・翌朝の引き算メニューを自動生成します。\\\")\\n\\n    today = date.today()\\n\\n    # --- ⭐ よく使う項目（プルダウンから選んで記録） ---\\n    customs = repo.list_custom_presets()\\n    if customs:\\n        st.markdown(\\\"**⭐ よく使う項目**\\\")\\n        labels = [p.label for p in customs]\\n        sel = st.selectbox(\\n            \\\"よく使う項目から選ぶ\\\", range(len(customs)),\\n            format_func=lambda i: labels[i], key=\\\"fav_select\\\",\\n            label_visibility=\\\"collapsed\\\",\\n        )\\n        if st.button(\\\"＋ 選んだ項目を記録\\\", key=\\\"fav_add\\\", width='stretch'):\\n            p = customs[sel]\\n            repo.add_event(p.to_event(datetime.now()))\\n            st.toast(f\\\"記録：{p.label}\\\")\\n            st.rerun()\\n\\n    # --- 品名から記録（近似を自動入力。無ければ手動入力） ---\\n    st.markdown(\\\"**🍽 食べた / 飲んだものを記録**\\\")\\n    name = st.text_input(\\\"品名（例：ラーメン、ハイボール、鶏むね肉）\\\", key=\\\"rec_name\\\")\\n\\n    match = None\\n    if name:\\n        candidates = food_db.search(name)\\n        if candidates:\\n            idx = 0\\n            if len(candidates) > 1:\\n                labels = [f\\\"{c.label}（{food_db.CATEGORY_LABEL[c.category]}）\\\" for c in candidates]\\n                idx = st.selectbox(\\\"近い候補\\\", range(len(candidates)),\\n                                   format_func=lambda i: labels[i], key=f\\\"cand_{name}\\\")\\n            match = candidates[idx]\\n            st.caption(f\\\"✅ 近似値を自動入力（編集可）：{match.label}\\\")\\n        else:\\n            st.caption(\\\"近似が見つかりません。下の数値を手動で入力してください。\\\")\\n\\n    # 品名・候補ごとにキーを変えて、近似値で初期化し直す\\n    mkey = (match.label if match else \\\"manual\\\") + \\\"|\\\" + name\\n    dv = match if match else None\\n    c1, c2, c3 = st.columns(3)\\n    salt = c1.number_input(\\\"塩分 g\\\", 0.0, 50.0, float(dv.salt_g if dv else 0.0), 0.5, key=f\\\"s_{mkey}\\\")\\n    carb = c2.number_input(\\\"糖質 g\\\", 0.0, 500.0, float(dv.carb_g if dv else 0.0), 5.0, key=f\\\"c_{mkey}\\\")\\n    fat = c3.number_input(\\\"脂質 g\\\", 0.0, 300.0, float(dv.fat_g if dv else 0.0), 5.0, key=f\\\"f_{mkey}\\\")\\n    c4, c5 = st.columns(2)\\n    protein = c4.number_input(\\\"タンパク g\\\", 0.0, 300.0, float(dv.protein_g if dv else 0.0), 5.0, key=f\\\"p_{mkey}\\\")\\n    alcohol = c5.number_input(\\\"アルコール g\\\", 0.0, 200.0, float(dv.alcohol_g if dv else 0.0), 2.0, key=f\\\"a_{mkey}\\\")\\n    c6, c7 = st.columns(2)\\n    default_cat = {\\\"meal\\\": 0, \\\"drink\\\": 1, \\\"salty\\\": 2}[dv.category if dv else \\\"meal\\\"]\\n    cat_label = c6.selectbox(\\\"カテゴリ\\\", [\\\"🍜 食事\\\", \\\"🍺 飲酒\\\", \\\"🧂 高塩分\\\"],\\n                             index=default_cat, key=f\\\"cat_{mkey}\\\")\\n    eaten_time = c7.time_input(\\\"時刻\\\", value=datetime.now().time(), key=f\\\"t_{mkey}\\\")\\n    preset_count = len(customs)\\n    at_limit = preset_count >= MAX_CUSTOM_PRESETS\\n    register = st.checkbox(\\n        f\\\"⭐ よく使う項目として登録（次回からワンタップ）　{preset_count}/{MAX_CUSTOM_PRESETS}件\\\",\\n        key=f\\\"reg_{mkey}\\\", disabled=at_limit,\\n    )\\n    if at_limit:\\n        st.caption(f\\\"「よく使う項目」は最大{MAX_CUSTOM_PRESETS}件です。登録するには下の管理から不要な項目を削除してください。\\\")\\n\\n    if st.button(\\\"記録する\\\", width='stretch', disabled=(not name)):\\n        cat = {\\\"🍜 食事\\\": \\\"meal\\\", \\\"🍺 飲酒\\\": \\\"drink\\\", \\\"🧂 高塩分\\\": \\\"salty\\\"}[cat_label]\\n        eaten_at = datetime.combine(today, eaten_time)\\n        repo.add_event(Event(name=name, eaten_at=eaten_at, salt_g=salt, carb_g=carb,\\n                             fat_g=fat, protein_g=protein, alcohol_g=alcohol))\\n        registered = False\\n        if register:\\n            try:\\n                repo.add_custom_preset(name, cat, salt_g=salt, carb_g=carb, fat_g=fat,\\n                                       protein_g=protein, alcohol_g=alcohol)\\n                registered = True\\n            except ValueError as e:\\n                st.warning(str(e))\\n        st.session_state.pop(\\\"rec_name\\\", None)\\n        st.toast((\\\"記録＆登録：\\\" if registered else \\\"記録：\\\") + name)\\n        st.rerun()\\n\\n    # --- 登録済み「よく使う項目」の管理 ---\\n    if customs:\\n        with st.expander(f\\\"⭐ よく使う項目の管理（{len(customs)}/{MAX_CUSTOM_PRESETS}件）\\\"):\\n            for p in customs:\\n                c1, c2 = st.columns([5, 1])\\n                c1.write(\\n                    f\\\"**{p.label}**（{_category_label(p.category)}）\\\"\\n                    f\\\"塩{p.salt_g:.0f}/糖{p.carb_g:.0f}/脂{p.fat_g:.0f}/Pro{p.protein_g:.0f}/Alc{p.alcohol_g:.0f}\\\"\\n                )\\n                if c2.button(\\\"削除\\\", key=f\\\"delpreset_{p.id}\\\"):\\n                    repo.delete_custom_preset(p.id)\\n                    st.rerun()\\n\\n    st.divider()\\n\\n    # --- 本日のイベント ---\\n    events = repo.events_on(today)\\n    if not events:\\n        st.info(\\\"まだ本日の記録がありません。上のボタンから入力してください。\\\")\\n        components.disclaimer()\\n        return\\n\\n    st.subheader(f\\\"本日の記録（{len(events)}件）\\\")\\n    for e in events:\\n        c1, c2 = st.columns([5, 1])\\n        c1.write(\\n            f\\\"{e.eaten_at.strftime('%H:%M')}　**{e.name}**　\\\"\\n            f\\\"(塩{e.salt_g:.0f} / 糖{e.carb_g:.0f} / 脂{e.fat_g:.0f} / Pro{e.protein_g:.0f} / Alc{e.alcohol_g:.0f})\\\"\\n        )\\n        if c2.button(\\\"削除\\\", key=f\\\"del_{e.id}\\\"):\\n            repo.delete_event(e.id)\\n            st.toast(\\\"削除しました\\\")\\n            st.rerun()\\n        with st.expander(\\\"⏰ 時刻を修正\\\"):\\n            ec1, ec2 = st.columns([3, 1])\\n            new_t = ec1.time_input(\\\"時刻\\\", value=e.eaten_at.time(), key=f\\\"et_{e.id}\\\",\\n                                   label_visibility=\\\"collapsed\\\")\\n            if ec2.button(\\\"更新\\\", key=f\\\"upd_{e.id}\\\"):\\n                repo.update_event_time(e.id, datetime.combine(today, new_t))\\n                st.toast(\\\"時刻を更新しました\\\")\\n                st.rerun()\\n\\n    st.divider()\\n\\n    # --- 給水スケジュール ---\\n    st.subheader(\\\"💧 残り時間の給水スケジュール\\\")\\n    debt = hydration.compute_water_debt(events, profile)\\n    target = debt.total_ml\\n    consumed = components.get_consumed_ml(repo, today)\\n    components.progress_block(\\\"本日の水分目標\\\", consumed, target)\\n    st.caption(\\n        f\\\"内訳：ベース {debt.base_ml:.0f}ml ＋ 塩分 {debt.salt_ml:.0f}ml \\\"\\n        f\\\"＋ アルコール {debt.alcohol_ml:.0f}ml\\\"\\n    )\\n    slots = hydration.build_schedule(target, consumed, datetime.now(), profile)\\n    components.schedule_table(slots)\\n\\n    # --- 引き算メニュー ---\\n    st.subheader(\\\"➖ 夜・翌朝の引き算メニュー\\\")\\n    plan = recovery.build_recovery_plan(events, profile)\\n    cols = st.columns(3)\\n    cols[0].metric(\\\"糖質\\\", f\\\"{plan.carb_consumed_g:.0f} g\\\", \\\"要制限\\\" if plan.carb_flag else \\\"OK\\\")\\n    cols[1].metric(\\\"脂質\\\", f\\\"{plan.fat_consumed_g:.0f} g\\\", \\\"低脂質で\\\" if plan.fat_flag else \\\"OK\\\")\\n    cols[2].metric(\\\"タンパク残\\\", f\\\"{plan.protein_remaining_g:.0f} g\\\",\\n                   f\\\"目標{plan.protein_target_g:.0f}g\\\")\\n    for s in plan.suggestions:\\n        st.write(\\\"・\\\" + s)\\n    if plan.foods:\\n        st.write(\\\"**おすすめ食材：** \\\" + \\\"、\\\".join(plan.foods))\\n\\n    components.disclaimer()\\n\", \"ui/pages/training.py\": \"\\\"\\\"\\\"💪 筋トレメモ：その日のメニューをフリーテキストで残すだけのシンプルなログ。\\\"\\\"\\\"\\n\\nfrom __future__ import annotations\\n\\nfrom datetime import date\\n\\nimport streamlit as st\\n\\nfrom db.repository import Repository\\nfrom core.profile import Profile\\n\\n\\nPLACEHOLDER = \\\"例）チェストプレス 45kg 9,8,7\\\\nアブベンチ 3セット\\\\nラットプル 50kg 10×3\\\"\\n\\n\\ndef render(repo: Repository, profile: Profile) -> None:\\n    st.header(\\\"💪 筋トレメモ\\\")\\n    st.caption(\\\"その日のメニューを自由に書いて残すだけ。種目・重量・レップ・セット、なんでも。\\\")\\n\\n    log_day = st.date_input(\\\"日付\\\", date.today())\\n    existing = repo.training_note_on(log_day)\\n\\n    body = st.text_area(\\n        \\\"メニュー\\\",\\n        value=existing,\\n        key=f\\\"memo_{log_day.isoformat()}\\\",\\n        height=180,\\n        placeholder=PLACEHOLDER,\\n    )\\n\\n    if st.button(\\\"保存\\\", width='stretch'):\\n        repo.upsert_training_note(log_day, body)\\n        st.toast(\\\"保存しました\\\" if body.strip() else \\\"メモを削除しました\\\")\\n        st.rerun()\\n\\n    st.divider()\\n    st.subheader(\\\"これまでのメモ\\\")\\n    notes = repo.recent_training_notes(30)\\n    if not notes:\\n        st.info(\\\"まだメモがありません。今日のメニューを書いてみてください。\\\")\\n        return\\n    for n in notes:\\n        with st.expander(n.log_date.strftime(\\\"%Y-%m-%d (%a)\\\"), expanded=(n.log_date == log_day)):\\n            st.text(n.body)\\n\"}");
    const requirements = ["sqlite3", "pandas", "altair"];
    const streamlitConfig = {"client.toolbarMode": "viewer", "theme.base": "light", "theme.primaryColor": "#1f8a70", "theme.backgroundColor": "#ffffff", "theme.secondaryBackgroundColor": "#f2f6f5"};
    mount(
      {
        entrypoint: "app.py",
        requirements,
        files,
        streamlitConfig,
        idbfsMountpoints: ["/mnt"],  // IndexedDB永続FS。/mnt 配下はリロードしても残る
      },
      document.getElementById("root")
    );
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () =>
        navigator.serviceWorker.register("sw.js").catch(() => {})
      );
    }
  </script>
